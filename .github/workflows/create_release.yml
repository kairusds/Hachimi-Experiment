name: Create Release

on:
  workflow_dispatch:
    inputs:
      skip_windows:
        description: "Check to skip the Windows build job."
        type: boolean
        default: true
        required: true
      debug:
        description: "Create debug build"
        type: boolean
        default: false
        required: true

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build-android:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[ci skip]')"
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: swatinem/rust-cache@v2

      - name: Setup and Patch Dependencies
        run: |
          pushd ..
          git clone --revision 44cdd653e2317d300fb8a6c9c36b03f23991e803 https://github.com/emilk/egui.git
          cd egui
          sed -i 's/ui.set_min_width(ui.available_width());/\/\/ ui.set_min_width(ui.available_width());/' crates/egui/src/containers/combo_box.rs
          popd

          echo -e "\negui = { path = '../egui/crates/egui' }" >> Cargo.toml
          echo "egui_extras = { path = '../egui/crates/egui_extras' }" >> Cargo.toml

      - name: Grant execute permission to build script
        run: chmod +x tools/android/build_mini.sh

      - name: Build Hachimi for Android
        run: |
          rustup target add aarch64-linux-android
          ./tools/android/build_mini.sh
        env:
          RELEASE: ${{ github.event.inputs.debug == 'true' && '0' || '1' }}

      - name: Attest Android
        uses: actions/attest@v4
        with:
          subject-path: |
            build/*.so
            build/sha256.json

      - name: Upload Android binaries
        uses: actions/upload-artifact@v7
        with:
          name: android
          path: |
            build/*.so
            build/sha256.json

  build-windows:
    runs-on: windows-latest
    if: |
      !contains(github.event.head_commit.message, '[ci skip]') &&
      github.event.inputs.skip_windows == 'false'
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: swatinem/rust-cache@v2

      - name: Setup and Patch Dependencies
        shell: powershell
        run: |
          pushd ..

          git clone --revision 44cdd653e2317d300fb8a6c9c36b03f23991e803 https://github.com/emilk/egui.git
          cd egui

          $File = "crates/egui/src/containers/combo_box.rs"
          (Get-Content $File) -replace 'ui.set_min_width\(ui.available_width\(\)\);', '// ui.set_min_width(ui.available_width());' | Set-Content $File

          cd ..

          git clone --revision 903043939a076dc81e122a1c8451755bfb3979c8 https://github.com/Nekomaru-PKU/egui-directx11.git
          cd egui-directx11

          $fxc = Get-ChildItem -Path "C:\Program Files (x86)\Windows Kits" -Recurse -Filter "fxc.exe" | Where-Object { $_.FullName -like "*x64*" } | Select-Object -First 1
          if (-not $fxc) { Write-Error "fxc.exe not found"; exit 1 }

          & $fxc.FullName /nologo /O3 /T vs_4_0 /E vs_egui /Fo shaders/vs_egui.bin shaders/egui.hlsl
          & $fxc.FullName /nologo /O3 /T ps_4_0 /E ps_egui /Fo shaders/ps_egui.bin shaders/egui.hlsl

          popd

          Add-Content -Path "Cargo.toml" -Value "`n"
          $patches = @(
            "egui-directx11 = { path = '../egui-directx11' }",
            "egui = { path = '../egui/crates/egui' }",
            "egui_extras = { path = '../egui/crates/egui_extras' }"
          )
          Add-Content -Path "Cargo.toml" -Value $patches

      - name: Build Hachimi for Windows
        run: |
          cargo build --target x86_64-pc-windows-msvc --target-dir build ${{ github.event.inputs.debug == 'true' && '' || '--release' }}
          move build\x86_64-pc-windows-msvc\release\hachimi.dll build

      - name: Build Cellar
        run: |
          git clone --depth 1 --revision d4c3f79801c8131e26df585766c35e5ce11ec57f https://github.com/Hachimi-Hachimi/Cellar
          cd Cellar
          cargo build --target x86_64-pc-windows-msvc --target-dir build --release
          move build\x86_64-pc-windows-msvc\release\cellar.dll build
          cd ..

      - name: Check out FunnyHoney
        run: git clone --depth 1 --revision 418b5348bd9b7376cc7485c591ca69d49aa4d805 https://gitlab.com/LeadRDRK/FunnyHoney.git

      - name: Build Installer
        run: |
          git clone --depth 1 --revision 4a09d33bdda922b4f3484f47e6d209414602855f https://github.com/teiosteppa/Installer
          copy build\hachimi.dll Installer
          move Cellar\build\cellar.dll Installer
          move FunnyHoney\FunnyHoney.exe Installer
          cd Installer
          cargo build --target x86_64-pc-windows-msvc --target-dir build --release --features compress_bin
          cd ..
          move Installer\build\x86_64-pc-windows-msvc\release\hachimi_installer.exe build

      - name: Get checksums for Windows binaries
        shell: bash
        run: |
          curl -L "https://github.com/BLAKE3-team/BLAKE3/releases/latest/download/b3sum_windows_x64_bin.exe" -o b3sum.exe
          DLL_HASH=($(./b3sum.exe build/hachimi.dll | tr -d '\r'))
          EXE_HASH=($(./b3sum.exe build/hachimi_installer.exe | tr -d '\r'))
          cat <<EOF > build/blake3.json
          {
            "hachimi.dll": "$DLL_HASH",
            "hachimi_installer.exe": "$EXE_HASH"
          }
          EOF

      - name: Attest Windows
        uses: actions/attest@v4
        with:
          subject-path: |
            build/blake3.json
            build/hachimi.dll
            build/hachimi_installer.exe

      - name: Upload Windows binaries
        uses: actions/upload-artifact@v7
        with:
          name: windows
          path: |
            build/blake3.json
            build/hachimi.dll
            build/hachimi_installer.exe

  create-release:
    needs: [build-android, build-windows]
    runs-on: ubuntu-latest
    if: |
      !contains(github.event.head_commit.message, '[ci skip]') &&
      (
        always() &&
        (
          needs.build-windows.result == 'success' ||
          (needs.build-windows.result == 'skipped' && github.event.inputs.skip_windows == 'true')
        )
      )
    steps:
      - name: Get release version
        id: get_info
        run: |
          VERSION=$(curl -sL "https://raw.githubusercontent.com/${{ github.repository }}/main/Cargo.toml" | \
            awk '/^\[package\]/{flag=1} flag && /^version/{print $3; exit}' | \
            tr -d '"')
          echo "release_version=v$VERSION" >> $GITHUB_OUTPUT

      - name: Download all build artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Upload binaries to a release
        uses: softprops/action-gh-release@v2
        with:
          body: "Experiment"
          files: |
            ${{ github.event.inputs.skip_windows == 'false' && 'artifacts/android/*' || 'artifacts/*' }}
            ${{ github.event.inputs.skip_windows == 'false' && 'artifacts/windows/*' || '' }}
          tag_name: ${{ steps.get_info.outputs.release_version }}
