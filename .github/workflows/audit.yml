name: Daily Cargo Audit

permissions:
  contents: write
  pull-requests: write

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  cargo_audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: swatinem/rust-cache@v2

      - name: Install cargo-audit
        run: cargo install cargo-audit --features=fix

      - name: Audit and fix
        run: cargo audit fix || true

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "Security update"
          title: "Automated Security Update"
          body: "Automated `cargo audit fix` to fix security vulnerabilities."
          branch: "auto-security-fix"
          delete-branch: true