update_prompt_dialog:
  title: "Доступно обновление"
  content: |
    Доступна новая версия Hachimi (%{version}). Хотите её установить?
    Игра перезапустится, чтобы примененить изменения.
  android_content: |
    Доступна новая версия Hachimi Edge (%{version}). Хотите её установить?

    Нажмите Да, чтобы открыть UmaPatcher Edge и снова пропатчить игру.
    (Заново скачивать игру или APK не требуется. Вам нужно просто пропатчить игру, как обычно, ведь UmaPatcher Edge всегда загружает последнюю версию Hachimi Edge.)

updating_dialog:
  title: "Обновление"
  content: "Загрузка обновления, игра скоро перезапустится..."

steam_overlay_conflict_dialog:
  title: "Внимание"
  content: >-
    Внутриигровые покупки могут не работать с включенным оверлеем Hachimi. Если оверлей Steam уже
    открылся для совершения покупки, пожалуйста, проигнорируйте это сообщение и нажмите Нет.
    Если же он не появился, нажмите Да, чтобы временно отключить оверлей Hachimi. Игра закроется,
    а при следующем запуске оверлей Hachimi будет отключен, и вы сможете совершить покупку.
    После этого вы можете снова перезапустить игру, чтобы вернуть обратно оверлей Hachimi.

