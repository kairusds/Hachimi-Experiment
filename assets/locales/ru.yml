first_time_setup:
  title: "Первоначальная настройка"
  welcome_heading: "Добро пожаловать"
  welcome_content: >-
    Hachimi теперь установлен! Это окно поможет вам выполнить первоначальную настройку.
    Если вас не интересует перевод игры, вы можете пропустить настройку, закрыв это окно.


    ВНИМАНИЕ: Hachimi - проект, развиваемый сообществом. Все переводы выполнены различными участниками этого сообщества.
    Этот проект нарушает условия обслуживания игры и Cygames, Inc. не разрабатывает или поддерживает его.
    Продолжая, вы принимаете, что используете его на свой страх и риск.
  translation_repo_heading: "Репозиторий переводов"
  select_translation_repo: "Выберите репозиторий переводов:"
  no_compatible_repo: "Ни один репозиторий не совместим с этой версией игры."
  skip_translation: "Пропустить перевод."
  common_settings_heading: "Частые настройки"
  common_settings_content: >-
    Это часто используемые параметры, которые вы можете хотеть изменить.
    Вы всегда сможете поменять их позже через окно настроек.
  complete_heading: "Всё готово!"
  complete_content: >-
    Нажмите Готово, чтобы сохранить настройки.
    Если вы выбрали репозиторий переводов, будет проверено наличие обновлений,
    и вам будет предложено загрузить новые данные переводов.

